domainInfo:
    AdminUserName: '@@SECRET:__weblogic-credentials__:username@@'
    AdminPassword: '@@SECRET:__weblogic-credentials__:password@@'
    ServerStartMode: dev
topology:
    Name: sample-domain1
    AdminServerName: admin-server
    Cluster:
        cluster-1:
            DynamicServers:
                ServerNamePrefix: managed-server
                CalculatedListenPorts: false
                MaximumDynamicServerCount: 1
                ServerTemplate: server-template_1
                DynamicClusterSize: 1
    Server:
        admin-server: {}
    ServerTemplate:
        server-template_1:
            ListenPort: '@@PROP:ServerTemp.server-template_1.ListenPort@@'
            Cluster: cluster-1
            JTAMigratableTarget:
                Cluster: cluster-1
            SSL:
                ListenPort: '@@PROP:ServerTemp.server-template_1.SSL.ListenPort@@'
appDeployments:
    Application:
        quickstart:
            SourcePath: wlsdeploy/applications/quickstart
            ModuleType: war
            Target: cluster-1
        console:
            SourcePath: /u01/oracle/wlserver/server/lib/wls-remote-console.war
            ModuleType: war
            Target: admin-server
