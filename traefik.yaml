  name: sample-domain1-quickstart-http
  namespace: weblogic-domain1-ns
spec:
  entryPoints:
    - websecure
  routes:
    - match: PathPrefix(`/quickstart`)
      kind: Rule
      middlewares:
        - name: weblogic-tls-headers
      services:
        - name: sample-domain1-cluster-cluster-1
          port: 8001

---
# HTTPS route für /rconsole (WebLogic Remote Console)
apiVersion: traefik.io/v1alpha1
