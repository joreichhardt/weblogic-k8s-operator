    - match: PathPrefix(`/quickstart`)
      kind: Rule
      middlewares:
        - name: weblogic-tls-headers
      services:
        - name: sample-domain1-cluster-cluster-1
          port: 8001
  tls: {}

---
# HTTP route für /quickstart (für WebLogic-Redirects auf http://IP:31320)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
